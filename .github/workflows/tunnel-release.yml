name: Tunnel CLI Release

# Кросс-платформенная сборка tunnel CLI через Bun.
#
# Билдит 4 бинарника на одном ubuntu-runner (Bun умеет cross-compile
# для всех платформ из любого хоста):
#   - nit-tunnel-linux-x64        Linux x64 (Intel/AMD)
#   - nit-tunnel-macos-arm64      macOS Apple Silicon (M1/M2/M3/M4)
#   - nit-tunnel-macos-x64        macOS Intel
#   - nit-tunnel-windows-x64.exe  Windows x64
#
# Триггер:
#   - push тега вида `tunnel-v*` (через `git push origin tunnel-v0.1.0`)
#   - публикация GitHub Release с тегом tunnel-v* (через UI/API) — sub-job
#     `release` всё равно завершится no-op потому что release уже создан,
#     но бинари приложатся к нему
#   - ручной запуск через GitHub UI (Actions → Tunnel CLI Release → Run workflow)
#
# Артефакты автоматически прикрепляются к GitHub Release.

on:
  push:
    tags:
      - "tunnel-v*"
  release:
    types: [created, published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.output }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: nit-tunnel-linux-x64
          - target: bun-darwin-arm64
            output: nit-tunnel-macos-arm64
          - target: bun-darwin-x64
            output: nit-tunnel-macos-x64
          - target: bun-windows-x64
            output: nit-tunnel-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Compile ${{ matrix.output }}
        run: |
          bun build \
            --compile \
            --minify \
            --sourcemap \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.output }} \
            ./tunnel/src/cli.ts

      - name: Verify binary
        run: |
          ls -lh ${{ matrix.output }}
          file ${{ matrix.output }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          retention-days: 7

  release:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Запускаем job если: push тега ИЛИ created release с тегом tunnel-v*
    if: |
      startsWith(github.ref, 'refs/tags/tunnel-v') ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'tunnel-v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Attach binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ steps.tag.outputs.tag }}
          name: NIT Tunnel ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## NIT Tunnel — клиент для подключения LM Studio к NIT Builder

            Кросс-платформенный CLI — один исполняемый файл, ничего устанавливать не нужно.

            ### Скачать

            | Платформа | Файл |
            |---|---|
            | 🦋 Windows | `nit-tunnel-windows-x64.exe` |
            | 🍎 macOS (M1/M2/M3/M4) | `nit-tunnel-macos-arm64` |
            | 💻 macOS (Intel) | `nit-tunnel-macos-x64` |
            | 🐧 Linux | `nit-tunnel-linux-x64` |

            ### Как использовать

            **1.** Запусти LM Studio, загрузи модель (рекомендуем `Qwen2.5-Coder-7B-Instruct`), включи Server (порт 1234).

            **2.** Получи tunnel-токен в [nit.vibecoding.by](https://nit.vibecoding.by) → войди в аккаунт → Settings → «Ключ доступа» →  Создать новый.

            **3.** Скачай бинарник под твою ОС.

            **4.** На macOS/Linux дай право на выполнение:
            ```bash
            chmod +x nit-tunnel-macos-arm64
            ```

            **5.** Запусти:

            **Windows (PowerShell):**
            ```powershell
            .\nit-tunnel-windows-x64.exe `
              --token ТВОЙ_ТОКЕН `
              --server wss://nit.vibecoding.by/api/tunnel `
              --lm-studio http://localhost:1234/v1
            ```

            **macOS / Linux:**
            ```bash
            ./nit-tunnel-macos-arm64 \
              --token ТВОЙ_ТОКЕН \
              --server wss://nit.vibecoding.by/api/tunnel \
              --lm-studio http://localhost:1234/v1
            ```

            Когда CLI подключится — в nit.vibecoding.by/app в навбаре загорится зелёный индикатор «Туннель онлайн», генерация пойдёт через твой GPU.

            ### Note for macOS users

            macOS может заблокировать бинарник (Gatekeeper) — бинары не подписаны сертификатом Apple. Как обойти:
            ```bash
            xattr -d com.apple.quarantine nit-tunnel-macos-arm64
            ```
            Или через System Settings → Privacy → Security → «Allow Anyway» после первого запуска.
