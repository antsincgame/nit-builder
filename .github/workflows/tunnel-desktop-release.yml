name: Tunnel Desktop Release

# Сборка GUI-клиента nit-tunnel (Tauri 2 + React) для всех платформ.
#
# Производит:
#   - Windows  → NIT Tunnel_0.1.0_x64-setup.exe (NSIS installer)
#   - macOS arm64 → NIT Tunnel_0.1.0_aarch64.dmg
#   - macOS x64  → NIT Tunnel_0.1.0_x64.dmg
#   - Linux    → nit-tunnel_0.1.0_amd64.deb + nit-tunnel_0.1.0_amd64.AppImage
#
# Триггер:
#   - push тега вида `tunnel-desktop-v*` (например `tunnel-desktop-v0.1.0`)
#   - публикация GitHub Release с tunnel-desktop-v* тегом
#   - ручной запуск через GitHub UI
#
# Артефакты автоматически прикрепляются к GitHub Release.
#
# Подписание (code signing) опционально:
#   - macOS: APPLE_CERTIFICATE + APPLE_CERTIFICATE_PASSWORD + APPLE_SIGNING_IDENTITY
#   - Windows: WINDOWS_CERTIFICATE + WINDOWS_CERTIFICATE_PASSWORD
# Без них бинари собираются без подписи (юзеру придётся "Allow Anyway").

on:
  push:
    tags:
      - "tunnel-desktop-v*"
  release:
    types: [created, published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    # Условие на release — реагируем только на tunnel-desktop-v* теги. Для
    # push и workflow_dispatch — всегда. Без этого workflow срабатывал бы на
    # любой release включая tunnel-v* (CLI релизы).
    if: |
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'tunnel-desktop-v')
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./tunnel/desktop/src-tauri -> target"

      # Linux-only системные зависимости для AppImage + WebKit (Tauri WebView)
      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # Устанавливаем UI зависимости и собираем frontend.
      # tauri-action ниже сам вызовет beforeBuildCommand из tauri.conf.json,
      # но мы делаем это явно чтобы:
      #   1. Кешировать node_modules между шагами
      #   2. Если frontend упадёт — упадёт здесь, понятная ошибка
      - name: Install UI dependencies
        working-directory: tunnel/desktop/ui
        run: npm install

      - name: Build UI
        working-directory: tunnel/desktop/ui
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          # Code signing — опционально, секреты могут отсутствовать.
          # Если есть — Tauri их подхватит автоматически из env.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Tauri updater signing (для auto-update в будущем)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tunnel/desktop
          # Указываем target для cross-build (важно для macOS Intel на ARM runner)
          args: --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-desktop-${{ matrix.platform.name }}
          path: |
            tunnel/desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg/*.dmg
            tunnel/desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/nsis/*.exe
            tunnel/desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/appimage/*.AppImage
            tunnel/desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/tunnel-desktop-v') ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'tunnel-desktop-v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Attach binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
          tag_name: ${{ steps.tag.outputs.tag }}
          name: NIT Tunnel Desktop ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## NIT Tunnel — десктопное приложение

            GUI-клиент для подключения LM Studio к nitgen. Один установщик — двойной клик и работает, никаких консолей.

            ### Скачать

            | Платформа | Файл |
            |---|---|
            | 🪟 Windows 10/11 | `NIT Tunnel_*.exe` (NSIS установщик) |
            | 🍎 macOS Apple Silicon (M1-M4) | `NIT Tunnel_*_aarch64.dmg` |
            | 💻 macOS Intel | `NIT Tunnel_*_x64.dmg` |
            | 🐧 Linux (Debian/Ubuntu) | `nit-tunnel_*_amd64.deb` |
            | 🐧 Linux (universal) | `nit-tunnel_*_amd64.AppImage` |

            ### Как использовать

            **1.** Запустите LM Studio, загрузите модель (рекомендуем `Qwen2.5-Coder-7B-Instruct`), включите Server (порт 1234).

            **2.** Получите ключ доступа на [nit.vibecoding.by](https://nit.vibecoding.by) → войдите в аккаунт → Settings → «Ключ доступа» → Создать новый.

            **3.** Скачайте установщик под вашу ОС, запустите, введите ключ — туннель подключится автоматически.

            **4.** В [nit.vibecoding.by/app](https://nit.vibecoding.by/app) загорится зелёный индикатор «Туннель онлайн» — генерация пойдёт через ваш GPU.

            ### macOS / Windows: «приложение не подписано»

            Сертификаты подписи кода стоят $99/год (Apple) и $200+/год (Windows EV). На раннем этапе мы их не покупаем — поэтому система может ругаться.

            **macOS:** правый клик на .dmg → Open → «Open Anyway» в System Settings → Privacy & Security.

            **Windows:** SmartScreen покажет «Windows protected your PC» → нажмите «More info» → «Run anyway».

            Это безопасно — исходный код полностью открыт ([GitHub](https://github.com/antsincgame/nit-builder)), сборка делается в GitHub Actions (видны логи каждой сборки).
