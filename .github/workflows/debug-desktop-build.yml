name: Debug Desktop Build

# Финальная миссия временного workflow: сгенерировать Cargo.lock для
# tunnel/desktop/src-tauri и закоммитить его в main через REST.
# После успешного прогона файл workflow удаляется.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  lockfile:
    name: Generate and commit Cargo.lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        working-directory: tunnel/desktop/src-tauri
        run: cargo generate-lockfile

      - name: Commit Cargo.lock to main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/tunnel/desktop/src-tauri/Cargo.lock" \
            -f message="chore(desktop): фиксируем Cargo.lock — воспроизводимые сборки без плавающих версий" \
            -f branch="main" \
            -f content="$(base64 -w0 < tunnel/desktop/src-tauri/Cargo.lock)"
