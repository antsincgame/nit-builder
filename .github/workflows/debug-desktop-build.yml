name: Debug Desktop Build

# Временный workflow, два job:
#   lockfile   — cargo generate-lockfile → Cargo.lock в ветку debug-logs-macos-latest
#   win-mirror — точное зеркало основной Win-сборки (--target + --bundles nsis)
#                с выгрузкой хвоста лога в debug-logs-windows-latest
# Выгрузка только через gh api --input body.json: большие base64-аргументы
# бьются об лимиты argv (Linux MAX_ARG_STRLEN 128KB, Windows 32KB).
# Пуши в main с GITHUB_TOKEN блокирует branch protection — поэтому ветки.
# Удалить после диагностики.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  lockfile:
    name: Generate Cargo.lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        working-directory: tunnel/desktop/src-tauri
        run: cargo generate-lockfile

      - name: Upload Cargo.lock via REST
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SRC_FILE: tunnel/desktop/src-tauri/Cargo.lock
          DEST_PATH: tunnel/desktop/src-tauri/Cargo.lock
          DEST_BRANCH: debug-logs-macos-latest
          COMMIT_MSG: "chore(desktop): Cargo.lock с раннера (для переноса в main)"
        run: |
          python3 - <<'PYEOF'
          import base64, json, os
          data = base64.b64encode(open(os.environ["SRC_FILE"], "rb").read()).decode()
          json.dump(
              {"message": os.environ["COMMIT_MSG"], "branch": os.environ["DEST_BRANCH"], "content": data},
              open("body.json", "w"),
          )
          PYEOF
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/${DEST_PATH}" --input body.json

  win-mirror:
    name: Mirror windows build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install UI dependencies
        working-directory: tunnel/desktop/ui
        run: npm install

      - name: Build UI
        working-directory: tunnel/desktop/ui
        run: npm run build

      - name: Tauri build (mirror)
        shell: bash
        continue-on-error: true
        working-directory: tunnel/desktop
        run: |
          npx --yes @tauri-apps/cli build --target x86_64-pc-windows-msvc --bundles nsis 2>&1 | tee "$RUNNER_TEMP/build-full.log" || true
          echo "EXIT_CODE=${PIPESTATUS[0]}" | tee -a "$RUNNER_TEMP/build-full.log"

      - name: Upload log tail via REST
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEST_BRANCH: debug-logs-windows-latest
          COMMIT_MSG: "debug: tauri build mirror log windows"
        run: |
          tail -c 60000 "$RUNNER_TEMP/build-full.log" > tail.log
          python3 - <<'PYEOF'
          import base64, json, os
          data = base64.b64encode(open("tail.log", "rb").read()).decode()
          json.dump(
              {"message": os.environ["COMMIT_MSG"], "branch": os.environ["DEST_BRANCH"], "content": data},
              open("body.json", "w"),
          )
          PYEOF
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/debug-mirror-${GITHUB_RUN_ID}.log" --input body.json
