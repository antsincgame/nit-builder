name: Debug Desktop Build

# Финальная миссия временного workflow: сгенерировать Cargo.lock для
# tunnel/desktop/src-tauri и выложить его через REST в ветку
# debug-logs-macos-latest (пуши в main с GITHUB_TOKEN блокируются
# branch protection). Перенос в main делается снаружи. После — удалить.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  lockfile:
    name: Generate Cargo.lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        working-directory: tunnel/desktop/src-tauri
        run: cargo generate-lockfile

      - name: Upload Cargo.lock via REST
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/tunnel/desktop/src-tauri/Cargo.lock" \
            -f message="chore(desktop): Cargo.lock с раннера (для переноса в main)" \
            -f branch="debug-logs-macos-latest" \
            -f content="$(base64 -w0 < tunnel/desktop/src-tauri/Cargo.lock)"
