name: Debug Desktop Build

# Временный диагностический workflow: настоящий `tauri build --no-bundle`
# (компиляция + линковка release без бандлеров) на падающих платформах
# с выгрузкой хвоста лога через gh api PUT в ветку debug-logs-<os>
# (git push из раннера и логи ранов через API не работают).
# Удалить после диагностики.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    name: Probe ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install UI dependencies
        working-directory: tunnel/desktop/ui
        run: npm install

      - name: Build UI
        working-directory: tunnel/desktop/ui
        run: npm run build

      - name: Tauri build (no bundle)
        shell: bash
        continue-on-error: true
        working-directory: tunnel/desktop
        run: |
          npx --yes @tauri-apps/cli build --no-bundle 2>&1 | tee "$RUNNER_TEMP/build-full.log" || true
          echo "EXIT_CODE=${PIPESTATUS[0]}" | tee -a "$RUNNER_TEMP/build-full.log"

      - name: Upload log tail via REST
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tail -c 45000 "$RUNNER_TEMP/build-full.log" > tail.log
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/debug-${{ github.run_id }}.log" \
            -f message="debug: tauri build log ${{ matrix.os }}" \
            -f branch="debug-logs-${{ matrix.os }}" \
            -f content="$(base64 < tail.log | tr -d '\n')"
