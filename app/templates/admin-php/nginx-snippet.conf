# Nginx-эквивалент .htaccess-защиты этого бандла.
# Nginx НЕ читает .htaccess — без этих правил data/users.json (хеши паролей)
# открыт по HTTP, а PHP, загруженный в assets/uploads/, исполнится.
#
# Подключение: положи рядом с конфигом сайта и внутри server { ... } добавь
#   include /путь/к/nginx-snippet.conf;
# или вставь содержимое напрямую в server-блок.
#
# ВАЖНО про ^~: regex-локейшены (location ~ \.php$ для PHP-FPM) в Nginx
# приоритетнее префиксных. Префикс ^~ останавливает проверку regex'ов —
# без него запрос /assets/uploads/shell.php попал бы в FPM ДО вложенного
# deny и выполнился. Поэтому именно ^~, а не обычный prefix.

# Папка с данными (content.json, users.json, zones.json) — полный запрет HTTP.
location ^~ /data/ {
    deny all;
    return 403;
}

# Загрузки: запрет исполнения любых скриптов (отдаются только как статика).
location ^~ /assets/uploads/ {
    location ~* \.(php|phtml|phps|php[0-9]?|phar|pl|py|cgi|asp|sh)$ {
        deny all;
    }
}
